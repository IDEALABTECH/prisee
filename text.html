<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js"></script>
</head>
<body>
    <h2>Application Form</h2>
    <form id="applicationForm">
        <label for="name">Họ và Tên:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="phone">Số Điện Thoại:</label><br>
        <input type="text" id="phone" name="phone" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="class">Lớp:</label><br>
        <input type="text" id="class" name="class" required><br><br>

        <label for="school">Trường:</label><br>
        <input type="text" id="school" name="school" required><br><br>

        <label for="gender">Giới Tính:</label><br>
        <select id="gender" name="gender" required>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
        </select><br><br>

        <label for="cv">Tải lên CV (PDF):</label><br>
        <input type="file" id="cv" name="cv" accept=".pdf" required><br><br>

        <button type="submit">Gửi Đơn</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
